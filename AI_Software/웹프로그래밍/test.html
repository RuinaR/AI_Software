<!--HTML5 표준 규약으로 만들어진 문서임-->
<!DOCTYPE html>
<html lang="ko">
<!-- 태그는 소문자로 작성하자 (구분은 하지 않음)-->
<!-- head 태그 : 웹문서의 메타데이터를 포함하는 영역 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title 태그 : 웹브라우저 제목 텝에 띄워지는 내용 -->
    <title>첫번째 웹문서</title>
</head>

<!-- body 태그 : 웹문서의 본문 내용을 포함하는 영역 -->
<body>
    [라이브서버 설치 후 최초 1회 우클릭 -> open with live server로 열기]
</body>
</html>
